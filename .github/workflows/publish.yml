name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to Maven Central
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: tools/codegen/uv.lock
      - name: Sync codegen environment
        working-directory: tools/codegen
        run: uv sync --locked
      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          gpg-private-key: ${{ secrets.GPG_KEY }}
          gpg-passphrase: GPG_PASSWORD
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD
      - name: Deploy
        if: github.event_name == 'release' || inputs.publish
        run: ./mvnw -B -ntp -Pdeploy deploy
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          GPG_PASSWORD: ${{ secrets.GPG_PASSWORD }}
      - name: Verify release build
        if: github.event_name != 'release' && !inputs.publish
        run: ./mvnw -B -ntp verify
