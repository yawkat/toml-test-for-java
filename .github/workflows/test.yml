name: Run tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          submodules: true
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: tools/codegen/uv.lock
      - name: Sync codegen environment
        working-directory: tools/codegen
        run: uv sync --locked
      - name: Setup Java 17
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build
        run: ./mvnw -B -ntp verify
